global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'healthcare-compliance'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter for system metrics
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

  # Docker metrics
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']

  # MongoDB metrics
  - job_name: 'mongodb'
    static_configs:
      - targets: ['localhost:9216']

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']

  # Application metrics (if implemented)
  - job_name: 'app'
    static_configs:
      - targets: ['localhost:3000']
    metrics_path: '/api/metrics'
